<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — Euro Polo</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
  <style>
    .login-page { background: linear-gradient(135deg,#060e07 0%,#0c1c0f 50%,#163320 100%); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="login-logo">EURO POLO</span>
      <span class="login-logo-sub">.COM.MY</span>
      <span class="login-badge">Admin Portal</span>
    </div>
    <div class="login-body">
      <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>
      <form id="loginForm">
        <div class="form-group mb-2">
          <label class="form-label">Username <span>*</span></label>
          <input class="form-input" id="loginUser" type="text" placeholder="Enter username" autocomplete="username" required/>
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Password <span>*</span></label>
          <input class="form-input" id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn btn--primary w-full" style="justify-content:center;padding:.75rem">Sign In →</button>
      </form>

      <div class="login-hint">
        <strong>Demo Credentials</strong>
        <table>
          <tr><td>Super Admin</td><td>admin</td><td>europolo2026</td></tr>
          <tr><td>Marketing</td><td>marketing</td><td>mkt@polo</td></tr>
          <tr><td>Content</td><td>content</td><td>cnt@polo</td></tr>
          <tr><td>Customer Service</td><td>cs</td><td>cs@polo</td></tr>
          <tr><td>Live Host</td><td>host</td><td>host@polo</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="auth.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.user()) window.location.href = EP_USERS[sessionStorage.getItem('ep_user')].path;

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const user = Auth.login(u, p);
    if (user) {
      seedIfEmpty();
      window.location.href = user.path;
    } else {
      const err = document.getElementById('loginError');
      err.classList.add('show');
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
      setTimeout(() => err.classList.remove('show'), 4000);
    }
  });
</script>
</body>
</html>
