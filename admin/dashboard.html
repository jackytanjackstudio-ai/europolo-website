<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — Euro Polo Admin</title><meta name="robots" content="noindex,nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-shell">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sb-logo"><a href="dashboard.html"><span class="sb-logo-main">EURO POLO</span><span class="sb-logo-sub">.MY</span><span class="sb-logo-badge">Admin</span></a></div>
    <div class="sb-nav">
      <p class="sb-section-label">Overview</p>
      <a href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
      <p class="sb-section-label">Commerce</p>
      <a href="orders.html"><span class="nav-icon">◉</span> Orders</a>
      <p class="sb-section-label">Departments</p>
      <a href="marketing.html"><span class="nav-icon">◆</span> Marketing</a>
      <a href="content.html"><span class="nav-icon">◇</span> Content</a>
      <a href="customer-service.html"><span class="nav-icon">◎</span> Customer Service</a>
      <a href="live-host.html"><span class="nav-icon">⊕</span> Live Host</a>
      <a href="page-editor.html"><span class="nav-icon">✎</span> Page Editor</a>
      <p class="sb-section-label">Site</p>
      <a href="../index.html" target="_blank"><span class="nav-icon">↗</span> View Website</a>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">AD</div>
        <div class="sb-user-info"><div class="sb-user-name">Admin</div><div class="sb-user-role">Super Admin</div></div>
        <button class="sb-logout" title="Logout">⏻</button>
      </div>
    </div>
  </nav>
  <div class="sb-overlay" id="sbOverlay"></div>

  <!-- MAIN -->
  <div class="main-area">
    <header class="admin-header">
      <div class="header-left">
        <button class="sb-toggle" id="sbToggle">☰</button>
        <div><div class="header-title">Dashboard</div><div class="header-breadcrumb">Euro Polo Admin · Overview</div></div>
      </div>
      <div class="header-right">
        <a href="../index.html" target="_blank" class="btn btn--outline btn--sm">↗ View Site</a>
      </div>
    </header>
    <div class="page-content" id="pageContent">
      <div class="stats-row" id="statsRow"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1.75rem" id="deptCards"></div>
      <div class="card">
        <div class="card-header"><span class="card-title">Recent Activity</span></div>
        <div class="card-body" id="activityLog"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="auth.js?v=2"></script>
<script>
Auth.guard(); seedIfEmpty(); UI.fillUser(); UI.initSidebar();
const camps = Store.get('campaigns',[]);
const enquiries = Store.get('enquiries',[]);
const promos = Store.get('promos',[]);
const faq = Store.get('faq',[]);
const orders = (()=>{ try{ return JSON.parse(localStorage.getItem('ep_orders')||'[]'); }catch(e){ return []; } })();
const products = Store.get('products',[]);
const lowStockItems = products.filter(p=>p.stock!==undefined && !isNaN(parseInt(p.stock)) && parseInt(p.stock)<=( parseInt(p.lowStock)||5) && p.status!=='Hidden');
const orderRevenue = orders.reduce((s,o)=>s+(o.total||0),0);

document.getElementById('statsRow').innerHTML = `
  <div class="stat-card" style="cursor:pointer" onclick="location.href='orders.html'"><span class="stat-num">${orders.length}</span><span class="stat-label">Total Orders</span></div>
  <div class="stat-card stat-card--green" style="cursor:pointer" onclick="location.href='orders.html'"><span class="stat-num">RM ${orderRevenue.toLocaleString('en-MY',{minimumFractionDigits:0})}</span><span class="stat-label">Revenue</span></div>
  <div class="stat-card stat-card--red"><span class="stat-num">${enquiries.filter(e=>e.status==='Unread').length}</span><span class="stat-label">Unread Enquiries</span></div>
  <div class="stat-card stat-card--blue"><span class="stat-num">${promos.filter(p=>p.active).length}</span><span class="stat-label">Active Promos</span></div>
`;

// Low stock alert
if(lowStockItems.length){
  const alertHtml = `<div class="card" style="border-left:3px solid var(--gold);margin-bottom:1rem">
    <div class="card-body">
      <div style="font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem">⚠ Low Stock Alert</div>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem">
        ${lowStockItems.map(p=>`<span class="badge badge--gold">${p.name} — ${p.stock} left</span>`).join('')}
      </div>
      <a href="content.html" style="font-size:.72rem;color:var(--gold);text-decoration:underline;display:inline-block;margin-top:.6rem">Update stock levels →</a>
    </div>
  </div>`;
  document.getElementById('pageContent').insertAdjacentHTML('afterbegin', alertHtml);
}

const depts = [
  {name:'Orders',icon:'◉',desc:'Customer orders, revenue, shipment tracking',href:'orders.html',stat:orders.filter(o=>o.status==='Processing').length+' processing',color:'var(--green)'},
  {name:'Marketing',icon:'◆',desc:'Campaigns, promo codes, social planner',href:'marketing.html',stat:camps.length+' campaigns',color:'var(--gold)'},
  {name:'Content',icon:'◇',desc:'Products, inventory, announcements, SEO',href:'content.html',stat:products.length+' products',color:'var(--prestige-alt)'},
  {name:'Customer Service',icon:'◎',desc:'Enquiries, templates, FAQ',href:'customer-service.html',stat:enquiries.filter(e=>e.status==='Unread').length+' unread',color:'var(--red)'},
];
document.getElementById('deptCards').innerHTML = depts.map(d=>`
  <div class="card" style="cursor:pointer;transition:box-shadow .2s" onclick="location.href='${d.href}'" onmouseenter="this.style.boxShadow='var(--shadow-md)'" onmouseleave="this.style.boxShadow='var(--shadow)'">
    <div class="card-body">
      <div style="font-size:1.8rem;color:${d.color};margin-bottom:.75rem">${d.icon}</div>
      <div style="font-size:1rem;font-weight:600;margin-bottom:.35rem">${d.name}</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:1rem">${d.desc}</div>
      <div class="flex items-center justify-between">
        <span class="badge badge--gold">${d.stat}</span>
        <span style="font-size:.7rem;color:var(--gold)">Open →</span>
      </div>
    </div>
  </div>`).join('');

const activity = Store.get('activity',[]).slice(0,12);
document.getElementById('activityLog').innerHTML = activity.length ? `
  <div style="display:flex;flex-direction:column;gap:.5rem">
    ${activity.map(a=>`<div class="flex items-center gap-2" style="padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.78rem">
      <span style="color:var(--gold);flex-shrink:0">◈</span>
      <span style="flex:1;color:var(--text)">${a.action}</span>
      <span style="color:var(--muted);font-size:.68rem;white-space:nowrap">${a.user} · ${new Date(a.ts).toLocaleDateString('en-MY')}</span>
    </div>`).join('')}
  </div>` :
  `<div class="empty-state"><div class="empty-state-icon">◇</div><p>No activity yet. Actions across departments will appear here.</p></div>`;
</script>
</body>
</html>
